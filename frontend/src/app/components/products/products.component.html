<div class="pt-20 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h1 class="font-heading text-3xl sm:text-4xl font-bold text-white mb-2">
        {{ selectedCategory || 'All Products' }}
      </h1>
      <p class="text-white/60">{{ totalProducts }} pieces available</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      <aside class="lg:w-64 flex-shrink-0">
        <div class="bg-surface rounded-xl p-6 sticky top-24">
          <h3 class="font-heading text-lg text-white mb-4">Filters</h3>
          
          <div class="mb-6">
            <label class="text-white/60 text-sm mb-2 block">Search</label>
            <input type="text" [(ngModel)]="searchTerm" (keyup.enter)="applyFilters()"
                   placeholder="Search products..."
                   class="input-field">
          </div>

          <div class="mb-6">
            <label class="text-white/60 text-sm mb-2 block">Category</label>
            <select [(ngModel)]="selectedCategory" (change)="applyFilters()" class="input-field">
              <option value="">All Categories</option>
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div class="mb-6">
            <label class="text-white/60 text-sm mb-2 block">Price Range</label>
            <div class="flex gap-2">
              <input type="number" [(ngModel)]="minPrice" placeholder="Min"
                     class="input-field">
              <input type="number" [(ngModel)]="maxPrice" placeholder="Max"
                     class="input-field">
            </div>
          </div>

          <div class="mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" [(ngModel)]="featuredOnly" (change)="applyFilters()"
                     class="w-4 h-4 rounded border-white/20 bg-primary text-gold focus:ring-gold">
              <span class="text-white/80">Featured Only</span>
            </label>
          </div>

          <button (click)="applyFilters()" class="btn-primary w-full">
            Apply Filters
          </button>
        </div>
      </aside>

      <div class="flex-1">
        <div class="flex justify-between items-center mb-6">
          <p class="text-white/60">
            Showing {{ products.length }} of {{ totalProducts }} products
          </p>
          <select [(ngModel)]="sortBy" (change)="applyFilters()" class="input-field w-auto">
            <option value="created_at-desc">Newest First</option>
            <option value="created_at-asc">Oldest First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A-Z</option>
          </select>
        </div>


          <div *ngIf="products.length === 0" class="text-center py-20">
            <p class="text-white/60 text-lg">No products found</p>
            <button (click)="resetFilters()" class="mt-4 text-gold hover:underline">
              Reset Filters
            </button>
          </div>

          <div *ngIf="products.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div *ngFor="let product of products" class="card group">
              <a [routerLink]="['/product-detail', product.id]">
                <div class="relative aspect-square overflow-hidden bg-surface">
                  <img [src]="getImageUrl(product.imageUrl)" [alt]="product.name"
                       (error)="onImageError($event)"
                       class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                  <span *ngIf="product.isFeatured" class="absolute top-3 left-3 px-2 py-1 bg-gold text-primary text-xs font-semibold rounded">
                    Featured
                  </span>
                  <span *ngIf="product.stockQuantity === 0" class="absolute inset-0 bg-primary/80 flex items-center justify-center">
                    <span class="text-white font-semibold">Out of Stock</span>
                  </span>
                </div>
              </a>
              <div class="p-4">
                <p class="text-gold text-sm mb-1">{{ product.category }}</p>
                <a [routerLink]="['/product-detail', product.id]">
                  <h3 class="text-white font-medium mb-2 group-hover:text-gold transition-colors truncate">
                    {{ product.name }}
                  </h3>
                </a>
                <p class="text-white/80 font-semibold mb-4">{{ formatCurrency(product.price) }}</p>
                <button *ngIf="product.stockQuantity > 0" (click)="addToCart(product)" 
                        class="w-full btn-primary text-sm py-2">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>

        <div *ngIf="totalPages > 1 && !loading" class="flex justify-center gap-2 mt-12">
          <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1"
                  class="px-4 py-2 rounded-lg bg-surface text-white/80 hover:bg-gold/20 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            Previous
          </button>
          <button *ngFor="let page of [].constructor(totalPages); let i = index" (click)="goToPage(i + 1)"
                  [class.bg-gold]="currentPage === i + 1"
                  [class.text-primary]="currentPage === i + 1"
                  class="w-10 h-10 rounded-lg bg-surface text-white/80 hover:bg-gold/20 transition-colors">
            {{ i + 1 }}
          </button>
          <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages"
                  class="px-4 py-2 rounded-lg bg-surface text-white/80 hover:bg-gold/20 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            Next
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
