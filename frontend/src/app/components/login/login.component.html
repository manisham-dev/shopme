<div class="pt-20 min-h-screen flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center">
          <span class="text-gold text-2xl">◆</span>
        </div>
      </a>
      <h1 class="font-heading text-3xl font-bold text-white">Welcome Back</h1>
      <p class="text-white/60 mt-2">Sign in to your account</p>
    </div>

    <div class="bg-surface rounded-2xl p-8">
      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="text-white/60 text-sm mb-2 block">Email</label>
          <input type="email" [(ngModel)]="email" name="email" required
                 class="input-field" placeholder="your@email.com">
        </div>

        <div class="mb-6">
          <label class="text-white/60 text-sm mb-2 block">Password</label>
          <input type="password" [(ngModel)]="password" name="password" required
                 class="input-field" placeholder="••••••••">
        </div>

        @if (error) {
          <div class="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm">
            {{ error }}
          </div>
        }

        <button type="submit" [disabled]="loading"
                class="btn-primary w-full disabled:opacity-50">
          @if (loading) {
            <span class="inline-block animate-spin mr-2">◌</span>
          }
          Sign In
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-white/60">
          Don't have an account?
          <a routerLink="/register" class="text-gold hover:underline">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
