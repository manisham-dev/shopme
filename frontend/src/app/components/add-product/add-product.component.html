<div class="pt-20 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h1 class="font-heading text-3xl sm:text-4xl font-bold text-white mb-2">
        Add New Product
      </h1>
      <p class="text-white/60">Create a new product listing</p>
    </div>

    @if (error) {
      <div class="mb-6 p-4 bg-accent/20 border border-accent rounded-lg">
        <p class="text-accent">{{ error }}</p>
      </div>
    }

    @if (success) {
      <div class="mb-6 p-4 bg-green-500/20 border border-green-500 rounded-lg">
        <p class="text-green-400">{{ success }}</p>
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="bg-surface rounded-xl p-6 space-y-6">
      <div>
        <label class="text-white/60 text-sm mb-2 block">Product Name *</label>
        <input type="text" [(ngModel)]="name" name="name" required
               placeholder="Enter product name"
               class="input-field">
      </div>

      <div>
        <label class="text-white/60 text-sm mb-2 block">Description</label>
        <textarea [(ngModel)]="description" name="description" rows="4"
                  placeholder="Enter product description"
                  class="input-field"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="text-white/60 text-sm mb-2 block">Price *</label>
          <input type="number" [(ngModel)]="price" name="price" required min="0" step="0.01"
                 placeholder="0.00"
                 class="input-field">
        </div>

        <div>
          <label class="text-white/60 text-sm mb-2 block">Category *</label>
          <select [(ngModel)]="category" name="category" required class="input-field">
            <option value="">Select Category</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="text-white/60 text-sm mb-2 block">Stock Quantity</label>
          <input type="number" [(ngModel)]="stockQuantity" name="stockQuantity" min="0"
                 placeholder="0"
                 class="input-field">
        </div>

        <div class="flex items-center">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" [(ngModel)]="isFeatured" name="isFeatured"
                   class="w-4 h-4 rounded border-white/20 bg-primary text-gold focus:ring-gold">
            <span class="text-white/80">Featured Product</span>
          </label>
        </div>
      </div>

      <div>
        <label class="text-white/60 text-sm mb-2 block">Product Image</label>
        <div class="border-2 border-dashed border-white/20 rounded-lg p-6 text-center hover:border-gold/50 transition-colors">
          @if (imagePreview) {
            <div class="mb-4">
              <img [src]="imagePreview" alt="Preview" class="max-h-48 mx-auto rounded-lg object-contain">
            </div>
          }
          <input type="file" (change)="onFileSelected($event)" accept="image/*"
                 class="hidden" id="imageInput">
          <label for="imageInput" class="cursor-pointer text-gold hover:text-gold/80">
            {{ imagePreview ? 'Change Image' : 'Click to upload image' }}
          </label>
          <p class="text-white/40 text-sm mt-2">JPG, PNG, GIF, WEBP (max 5MB)</p>
        </div>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="submit" [disabled]="loading" class="btn-primary flex-1">
          {{ loading ? 'Creating...' : 'Create Product' }}
        </button>
        <a routerLink="/products" class="btn-secondary px-6">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
